name: grc-gate

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  grc-gate:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Terraform sanity + plan generation
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform fmt / validate / plan
        run: |
          terraform fmt -check
          terraform init -input=false
          terraform validate
          terraform plan -out tfplan
          terraform show -json tfplan > week1/evidence/plan.json

      - name: Install Conftest
        run: |
          curl -L \
            https://github.com/open-policy-agent/conftest/releases/download/v0.52.0/conftest_0.52.0_Linux_x86_64.tar.gz \
            -o conftest.tar.gz
          tar -xzf conftest.tar.gz
          mv conftest /usr/local/bin/
          conftest --version

      - name: Run policy gate
        run: |
          mkdir -p evidence
          conftest test week1/evidence/plan.json \
            --policy week2/policies \
            --output json \
            > evidence/conftest-results.json

      - name: Post Policy Results to PR Comment
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'evidence/conftest-results.json';
            if (!fs.existsSync(path)) {
              core.warning("Conftest output JSON not found. Skipping PR comment.");
              return;
            }
            const results = JSON.parse(fs.readFileSync(path, 'utf8'));
            let commentBody = `### 🛡️ GRC Policy Gate Report\n\n`;
            commentBody += `| Policy File | Namespace | Successes | Failures | Warnings |\n`;
            commentBody += `| :--- | :--- | :---: | :---: | :---: |\n`;
            let totalFailures = 0;
            results.forEach(res => {
              const failures = res.failures ? res.failures.length : 0;
              const warnings = res.warnings ? res.warnings.length : 0;
              const successes = res.successes || 0;
              totalFailures += failures;
              commentBody += `| \`${res.filename}\` | \`${res.namespace}\` | ${successes} | ${failures > 0 ? '❌ ' + failures : '✅ 0'} | ${warnings > 0 ? '⚠️ ' + warnings : '0'} |\n`;
            });
            commentBody += `\n**Status:** ${totalFailures > 0 ? '❌ Policy execution failed. Please fix violations.' : '✅ All constraints passed validation.'}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: commentBody
            });

      - name: Fail if policies fail
        run: |
          if grep -q '"fail"' evidence/conftest-results.json; then
            echo "❌ Policy gate failed — see evidence/conftest-results.json"
            exit 1
          else
            echo "✅ All policy namespaces passed"
          fi

      - name: Bundle evidence directory
        if: always()
        run: tar -czf evidence.tar.gz evidence/

      - name: Write SHA-256 sidecar
        if: always()
        run: sha256sum evidence.tar.gz | awk '{print $1}' > evidence.tar.gz.sha256

      - name: Install Cosign
        if: always()
        run: |
          COSIGN_VERSION=v2.2.3
          curl -L "https://github.com/sigstore/cosign/releases/download/${COSIGN_VERSION}/cosign-linux-amd64" \
            -o cosign
          chmod +x cosign
          mv cosign /usr/local/bin/
          cosign version

      - name: Keyless sign evidence bundle
        if: always()
        run: |
          cosign sign-blob --yes --bundle evidence.sig.bundle evidence.tar.gz

      - name: Verify signed evidence bundle (provenance)
        if: always()
        run: |
          cosign verify-blob \
            --bundle evidence.sig.bundle \
            --certificate-identity-regexp "https://github.com/${{ github.repository }}/.*" \
            --certificate-oidc-issuer-regexp "https://token.actions.githubusercontent.com.*" \
            evidence.tar.gz

      - name: Upload signed evidence artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: grc-evidence
          path: |
            evidence/
            evidence.tar.gz
            evidence.tar.gz.sha256
            evidence.sig.bundle
