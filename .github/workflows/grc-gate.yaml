name: grc-gate

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  grc-gate:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Conftest
        run: |
          curl -L \
            https://github.com/open-policy-agent/conftest/releases/download/v0.52.0/conftest_0.52.0_Linux_x86_64.tar.gz \
            -o conftest.tar.gz
          tar -xzf conftest.tar.gz
          sudo mv conftest /usr/local/bin/
          conftest --version

      - name: Debug working directory
        run: |
          echo "PWD:"
          pwd
          echo "Repository contents:"
          ls -R .
          echo "Checking for plan.json:"
          ls -l week1/evidence/plan.json || echo "plan.json not found"

      - name: Run policy gate
        run: |
          mkdir -p evidence
          conftest test week1/evidence/plan.json \
            --policy week2/policies \
            --output json \
            > evidence/conftest-results.json

      - name: Fail if policies fail
        run: |
          if grep -q '"fail"' evidence/conftest-results.json; then
            echo "❌ Policy gate failed — see evidence/conftest-results.json"
            exit 1
          else
            echo "✅ All policy namespaces passed"
          fi

      - name: Bundle evidence directory
        if: always()
        run: tar -czf evidence.tar.gz evidence/

      - name: Write SHA-256 sidecar
        if: always()
        run: sha256sum evidence.tar.gz | awk '{print $1}' > evidence.tar.gz.sha256

      - name: Install Cosign
        if: always()
        run: |
          COSIGN_VERSION=v2.2.3
          curl -L "https://github.com/sigstore/cosign/releases/download/${COSIGN_VERSION}/cosign-linux-amd64" \
            -o cosign
          chmod +x cosign
          sudo mv cosign /usr/local/bin/
          cosign version

      - name: Keyless sign evidence bundle
        if: always()
        permissions:
          id-token: write
        run: cosign sign-blob --yes --bundle evidence.sig.bundle evidence.tar.gz

      - name: Upload signed evidence artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: grc-evidence
          path: |
            evidence/
            evidence.tar.gz
            evidence.tar.gz.sha256
            evidence.sig.bundle
